server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**

            - id: category-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/categories/**